# configs/templates/pulsed_pd.yaml
#
# Minimal pulsed radar performance template (model_based or signal_level).
# Intended as a starting point for Pd vs range + FAR bookkeeping.

radar:
  fc_hz: 1.0e10
  tx_power_w: 1.0e3
  prf_hz: 1.0e3
  duty_cycle: 0.1

antenna:
  gain_tx_db: 30.0
  gain_rx_db: 30.0

receiver:
  bw_hz: 5.0e6
  nf_db: 5.0
  temperature_k: 290.0

target:
  rcs_sqm: 1.0

environment:
  system_losses_db: 0.0

detection:
  pfa: 1.0e-6
  n_pulses: 16
  integration: noncoherent

geometry:
  n_range_bins: 256
  n_doppler_bins: 64
  beams_per_scan: 10
  n_cpi_per_dwell: 1

metrics:
  ranges_m: [10000.0, 15000.0, 20000.0, 30000.0, 40000.0]