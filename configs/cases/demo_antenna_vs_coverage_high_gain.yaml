# configs/cases/demo_antenna_vs_coverage_high_gain.yaml
#
# Phase 2 trade-off demo (coverage/revisit vs link budget):
# HIGH antenna gain => better SNR/Pd but slower scan (worse revisit).
#
# Engineering story
# -----------------
# This is the companion to demo_antenna_vs_coverage_low_gain.yaml.
# It represents a "performance-first" configuration:
# - higher gain increases received SNR and therefore Pd for the same Pfa.
# - more beams per scan increases scan_time_s, degrading coverage/revisit.
#
# Run:
#   python -m cli.run_case --case configs/cases/demo_antenna_vs_coverage_high_gain.yaml --engine auto --seed 123 --overwrite --strict
#
# Expected direction:
#   - scan_time_s larger than low-gain case (coverage/revisit worse)
#   - snr_db and Pd larger than low-gain case at the same range points

execution:
  mode: model_based

assumptions:
  - "Monostatic radar equation with free-space propagation."
  - "Point target with deterministic RCS (no Swerling fluctuations)."
  - "Thermal noise dominates; no explicit interference/jamming in this case."
  - "Coverage cost is represented by beams_per_scan and dwell/cpi timing (scan_time_s)."

radar:
  fc_hz: 10000000000.0
  tx_power_w: 1000.0
  prf_hz: 1000.0
  duty_cycle: 0.1

antenna:
  # High-gain mode (performance-first).
  # Chosen to be ~20 dB above the baseline 30 dB case per channel:
  # 40 dB Tx and 40 dB Rx => +20 dB total compared to 30/30.
  gain_tx_db: 40.0
  gain_rx_db: 40.0

receiver:
  bw_hz: 5000000.0
  nf_db: 5.0
  temperature_k: 290.0

target:
  rcs_sqm: 1.0

environment:
  system_losses_db: 0.0

detection:
  pfa: 1.0e-6
  n_pulses: 16
  integration: noncoherent

metrics:
  ranges_m: [10000.0, 15000.0, 20000.0, 30000.0, 40000.0]

geometry:
  # Coverage proxy: more beams => longer scan time => worse revisit.
  n_range_bins: 256
  n_doppler_bins: 64
  beams_per_scan: 64
  n_cpi_per_dwell: 1